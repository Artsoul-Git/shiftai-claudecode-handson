<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>フレーム・トーク ─ WEB名刺サンプル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica Neue","Yu Gothic UI",sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.stage{width:100%;max-width:1100px}
.head{text-align:center;margin-bottom:40px;display:flex;flex-direction:column;align-items:center}
.img-01{width:120px;height:120px;border-radius:50%;background:#e5e5e5;display:grid;place-items:center;color:#888;font-family:monospace;font-size:11px;margin:0 auto 16px}
.name{font-size:30px;font-weight:300;letter-spacing:.18em;margin-bottom:6px}
.tag{color:#888;font-size:12px;letter-spacing:.3em;text-transform:uppercase}
.intro{max-width:480px;margin:18px auto 0;line-height:1.9;color:#444;font-size:14px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:24px auto;max-width:480px}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr);gap:16px;max-width:none}}
.tile{position:relative;aspect-ratio:1/1;background:#ddd;overflow:hidden;cursor:pointer;border-radius:4px;opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s}
.tile.in{opacity:1;transform:translateY(0)}
.tile:nth-child(1){grid-column:span 2;aspect-ratio:2/1}
.tile-num{position:absolute;inset:0;display:grid;place-items:center;color:#888;font-family:monospace;font-size:13px;letter-spacing:.06em;background:#e5e5e5;transition:transform .4s}
.overlay{position:absolute;inset:0;background:rgba(10,10,10,.78);color:#fff;display:flex;align-items:flex-end;padding:18px;opacity:0;transition:.3s}
.overlay h3{font-size:15px;font-weight:600;margin-bottom:4px}
.overlay p{font-size:12px;color:#ccc;line-height:1.6}
.tile:hover .tile-num{transform:scale(1.08)}
.tile:hover .overlay{opacity:1}
.foot{text-align:center;margin-top:36px;padding-top:24px;border-top:1px solid #e5e5e5;color:#888;font-size:12px;letter-spacing:.2em}
.foot a{color:#1a1a1a;text-decoration:none;margin:0 10px;font-weight:700}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:99;padding:24px;cursor:zoom-out}
.lb.open{display:flex}
.lb-card{max-width:560px;background:#fff;border-radius:8px;overflow:hidden;cursor:default}
.lb-img{aspect-ratio:1/1;background:#e5e5e5;display:grid;place-items:center;color:#888;font-family:monospace}
.lb-body{padding:24px}
.lb-body h2{font-size:20px;margin-bottom:8px}
.lb-body p{line-height:1.85;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="stage">
  <header class="head">
    <div class="img-01">[ 01 portrait ]</div>
    <h1 class="name">あなたの名前</h1>
    <p class="tag">Photographer &middot; Storyteller</p>
    <p class="intro">ここに「私はこういう景色を撮ります」「こういう仕事を残してきました」を3行で。</p>
  </header>
  <section class="grid">
    <div class="tile js-fade" data-t="主役の一枚" data-d="この一枚を見てほしい、という代表作の説明文。"><div class="tile-num">[02] feature</div><div class="overlay"><div><h3>主役の一枚</h3><p>クリックで詳細</p></div></div></div>
    <div class="tile js-fade" data-t="作品②" data-d="解説文②"><div class="tile-num">[03]</div><div class="overlay"><div><h3>作品②</h3><p>クリックで詳細</p></div></div></div>
    <div class="tile js-fade" data-t="作品③" data-d="解説文③"><div class="tile-num">[04]</div><div class="overlay"><div><h3>作品③</h3><p>クリックで詳細</p></div></div></div>
    <div class="tile js-fade" data-t="作品④" data-d="解説文④"><div class="tile-num">[05]</div><div class="overlay"><div><h3>作品④</h3><p>クリックで詳細</p></div></div></div>
    <div class="tile js-fade" data-t="作品⑤" data-d="解説文⑤"><div class="tile-num">[06]</div><div class="overlay"><div><h3>作品⑤</h3><p>クリックで詳細</p></div></div></div>
    <div class="tile js-fade" data-t="作品⑥" data-d="解説文⑥"><div class="tile-num">[07]</div><div class="overlay"><div><h3>作品⑥</h3><p>クリックで詳細</p></div></div></div>
  </section>
  <footer class="foot">CONTACT &nbsp;&middot;&nbsp;<a href="#">X</a><a href="#">Insta</a><a href="#">Mail</a></footer>
</div>
<div class="lb" id="lb">
  <div class="lb-card" onclick="event.stopPropagation()">
    <div class="lb-img" id="lbimg">[ image ]</div>
    <div class="lb-body"><h2 id="lbt"></h2><p id="lbd"></p></div>
  </div>
</div>
<script>
const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('in')),{threshold:.15});
document.querySelectorAll('.js-fade').forEach((el,i)=>{setTimeout(()=>io.observe(el),i*80)});
const lb=document.getElementById('lb');
document.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{
  document.getElementById('lbt').textContent=t.dataset.t;
  document.getElementById('lbd').textContent=t.dataset.d;
  document.getElementById('lbimg').textContent=t.querySelector('.tile-num').textContent;
  lb.classList.add('open');
}));
lb.addEventListener('click',()=>lb.classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')lb.classList.remove('open');});
</script>
</body></html>
