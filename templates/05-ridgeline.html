<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>リッジライン ─ WEB名刺サンプル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica Neue","Yu Gothic UI",sans-serif;background:#1a1f1a;color:#e8eae5;min-height:100vh;display:flex;justify-content:center;padding:24px 16px;background-image:repeating-linear-gradient(0deg,transparent 0,transparent 24px,rgba(232,234,229,.03) 24px,rgba(232,234,229,.03) 25px),repeating-linear-gradient(90deg,transparent 0,transparent 24px,rgba(232,234,229,.03) 24px,rgba(232,234,229,.03) 25px);background-attachment:fixed}
.stage{width:100%;max-width:1100px}
.coord{font-family:monospace;font-size:10px;letter-spacing:.2em;color:#7a8a6a;margin-bottom:6px;text-align:center}
.ridge-wrap{position:relative;height:200px;margin-bottom:20px;border-top:1px solid #3a4a3a;border-bottom:1px solid #3a4a3a;overflow:hidden}
@media(min-width:900px){.ridge-wrap{height:280px}}
.ridge-svg{position:absolute;inset:0;width:100%;height:100%}
.ridge path{fill:none;stroke:#7fb069;stroke-width:1.5;stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 3.5s ease-out forwards}
.ridge .alt{stroke:#ff6b35;stroke-width:1;animation-delay:1s}
@keyframes draw{to{stroke-dashoffset:0}}
.peak{position:absolute;background:#ff6b35;color:#1a1f1a;font-family:monospace;font-size:11px;padding:3px 8px;font-weight:700;letter-spacing:.06em;transform:translate(-50%,-100%)}
.head{display:flex;gap:24px;align-items:center;justify-content:center;padding:24px 0;border-bottom:1px solid #3a4a3a;flex-wrap:wrap}
.img-01{width:120px;height:120px;background:#2a3a2a;border:1px solid #7fb069;display:grid;place-items:center;color:#7fb069;font-family:monospace;font-size:10px;flex-shrink:0}
.head-info{text-align:left}
@media(max-width:600px){.head-info{text-align:center}}
.head-info p{font-family:monospace;font-size:11px;color:#7fb069;letter-spacing:.2em;text-transform:uppercase}
.head-info h1{font-size:32px;font-weight:300;letter-spacing:.04em;margin:4px 0}
.specs{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:24px 0;border:1px solid #3a4a3a}
.spec{padding:18px 12px;text-align:center;border-right:1px solid #3a4a3a;transition:.3s}
.spec:last-child{border-right:0}
.spec:hover{background:#2a3a2a}
.spec-label{font-family:monospace;font-size:9px;letter-spacing:.2em;color:#7fb069;margin-bottom:6px}
.spec-val{font-size:28px;font-weight:700;color:#ff6b35;transition:.3s}
.spec:hover .spec-val{transform:scale(1.12)}
.section{margin:32px 0}
.section h2{font-family:monospace;font-size:13px;letter-spacing:.3em;color:#ff6b35;margin-bottom:14px;text-align:left}
.section h2:before{content:"◆ "}
.text{font-size:14px;line-height:1.85;color:#c8cac3;max-width:760px;margin:0 auto;text-align:left}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;max-width:760px;margin-left:auto;margin-right:auto}
.field{aspect-ratio:1/1;background:#2a3a2a;display:grid;place-items:center;color:#7fb069;font-family:monospace;font-size:11px;border:1px solid #3a4a3a}
.foot{margin-top:36px;padding-top:20px;border-top:1px solid #3a4a3a;display:flex;justify-content:space-between;font-family:monospace;font-size:11px;color:#7a8a6a;letter-spacing:.1em;flex-wrap:wrap;gap:8px;max-width:760px;margin-left:auto;margin-right:auto}
.foot a{color:#ff6b35;text-decoration:none}
</style>
</head>
<body>
<div class="stage">
  <p class="coord">N 34°39'11.0" / E 133°55'04.0" &middot; ALT 0080m</p>
  <div class="ridge-wrap">
    <svg class="ridge-svg ridge" viewBox="0 0 1200 280" preserveAspectRatio="none">
      <path d="M0,240 L100,180 L180,210 L260,140 L340,170 L420,100 L500,140 L600,80 L700,130 L800,170 L900,130 L1000,180 L1100,160 L1200,200" />
      <path class="alt" d="M0,260 L120,200 L220,230 L300,170 L400,200 L500,150 L580,180 L680,140 L780,170 L880,160 L980,200 L1080,180 L1200,220" />
    </svg>
    <div class="peak" style="left:50%;top:30%">PEAK</div>
  </div>
  <header class="head">
    <div class="img-01">[01]<br>portrait</div>
    <div class="head-info">
      <p>GUIDE &middot; OUTFITTER</p>
      <h1>あなたの名前</h1>
    </div>
  </header>
  <section class="specs">
    <div class="spec"><p class="spec-label">YEARS</p><p class="spec-val" data-target="12">0</p></div>
    <div class="spec"><p class="spec-label">TRIPS</p><p class="spec-val" data-target="240">0</p></div>
    <div class="spec"><p class="spec-label">SUMMIT</p><p class="spec-val" data-target="38">0</p></div>
  </section>
  <section class="section">
    <h2>FIELD NOTE</h2>
    <p class="text">ここに自己紹介を3-4行。山で見えてきたこと、ガイドとして大切にしていること、これから組みたい仲間像。</p>
  </section>
  <section class="section">
    <h2>FIELD</h2>
    <div class="field-grid">
      <div class="field">[02] field-1</div>
      <div class="field">[03] field-2</div>
    </div>
  </section>
  <footer class="foot">
    <span>CONTACT</span>
    <span><a href="#">X</a> / <a href="#">INSTA</a> / <a href="#">MAIL</a></span>
  </footer>
</div>
<script>
document.querySelectorAll('.spec-val').forEach(el=>{
  const target=+el.dataset.target,dur=2000,start=performance.now();
  const tick=t=>{const p=Math.min(1,(t-start)/dur);el.textContent=Math.round(target*p)+(el.dataset.target==='240'?'+':'');if(p<1)requestAnimationFrame(tick);};
  setTimeout(()=>requestAnimationFrame(tick),1500);
});
</script>
</body></html>
