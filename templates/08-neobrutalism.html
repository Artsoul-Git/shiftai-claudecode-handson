<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ネオブルータリズム・ポップ ─ WEB名刺サンプル</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter","Noto Sans JP",sans-serif;background:#fff8a0;color:#000;min-height:100vh;display:flex;justify-content:center;padding:24px 16px;overflow-x:hidden}
.stage{width:100%;max-width:980px;position:relative}
.head{padding:32px 0;text-align:center}
.eyebrow{display:inline-block;background:#000;color:#fff;padding:6px 14px;font-size:12px;font-weight:900;letter-spacing:.1em;transform:rotate(-2deg);box-shadow:6px 6px 0 #ff3399;margin-bottom:18px;animation:wobble 3s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.name-block{position:relative;display:inline-block;margin:18px 0}
.name{font-family:"Archivo Black",sans-serif;font-size:clamp(48px,11vw,120px);line-height:.9;text-transform:uppercase;color:#000;letter-spacing:-.02em;background:#fff;padding:14px 24px;border:5px solid #000;box-shadow:14px 14px 0 #3361ff;display:inline-block;transform:rotate(-1deg);transition:.3s}
.name:hover{transform:rotate(1deg) scale(1.02);box-shadow:18px 18px 0 #ff3399}
.tag{display:inline-block;background:#ff3399;color:#fff;padding:8px 16px;font-weight:900;letter-spacing:.04em;border:4px solid #000;box-shadow:6px 6px 0 #000;transform:rotate(2deg);margin-top:18px;font-size:15px}
.head-row{display:flex;flex-direction:column;align-items:center;gap:24px;margin-top:32px}
@media(min-width:700px){.head-row{flex-direction:row;justify-content:center}}
.img-01{width:200px;height:200px;background:#3361ff;color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px;letter-spacing:.04em;border:5px solid #000;box-shadow:10px 10px 0 #000;transform:rotate(-3deg);transition:.3s;flex-shrink:0}
.img-01:hover{transform:rotate(3deg) scale(1.05)}
.intro{background:#fff;border:5px solid #000;padding:18px;font-weight:700;line-height:1.6;max-width:380px;font-size:15px;box-shadow:8px 8px 0 #ff3399;transform:rotate(1deg)}
.grid{display:grid;grid-template-columns:1fr;gap:20px;padding:48px 0}
@media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr)}}
.skill{background:#fff;border:5px solid #000;padding:24px;font-weight:900;text-align:center;opacity:0;transform:translateY(40px) rotate(0);transition:.6s cubic-bezier(.5,1.6,.5,1)}
.skill.in{opacity:1;transform:translateY(0)}
.skill:nth-child(1){box-shadow:10px 10px 0 #ff3399;background:#fff8a0}
.skill:nth-child(1).in{transform:translateY(0) rotate(-2deg)}
.skill:nth-child(2){box-shadow:10px 10px 0 #3361ff}
.skill:nth-child(2).in{transform:translateY(0) rotate(1deg)}
.skill:nth-child(3){box-shadow:10px 10px 0 #000;background:#fff8a0}
.skill:nth-child(3).in{transform:translateY(0) rotate(-1deg)}
.skill-num{display:inline-block;background:#000;color:#fff;width:32px;height:32px;border-radius:50%;line-height:32px;font-size:14px;margin-bottom:12px}
.skill-title{font-size:24px;text-transform:uppercase;margin-bottom:8px}
.skill-desc{font-weight:700;font-size:13px;line-height:1.6}
.foot{margin-top:48px;padding:24px;background:#000;color:#fff;font-weight:900;letter-spacing:.06em;text-align:center;border:5px solid #000;box-shadow:8px 8px 0 #ff3399;display:flex;justify-content:space-around;flex-wrap:wrap;gap:14px;font-size:15px}
.foot a{color:#ff3399;text-decoration:none}
.foot a:hover{color:#fff8a0}
</style>
</head>
<body>
<div class="stage">
  <header class="head">
    <span class="eyebrow">★ WEB CARD ★</span>
    <div class="name-block">
      <h1 class="name">Your<br>Name!</h1>
    </div><br>
    <span class="tag">CREATOR · MAKER · DOER</span>
    <div class="head-row">
      <div class="img-01">[ 01<br>portrait ]</div>
      <p class="intro">ここに3行で自己紹介！元気いっぱい、感情ありの言葉で。「やってます！」「好きです！」「組みたいです！」を全面に。</p>
    </div>
  </header>
  <section class="grid">
    <div class="skill js-fade"><div class="skill-num">1</div><div class="skill-title">作る</div><p class="skill-desc">手を動かす仕事。ものづくり全般。</p></div>
    <div class="skill js-fade"><div class="skill-num">2</div><div class="skill-title">教える</div><p class="skill-desc">ワークショップやコーチング系。</p></div>
    <div class="skill js-fade"><div class="skill-num">3</div><div class="skill-title">繋ぐ</div><p class="skill-desc">人と人、企画と現場をマッチング。</p></div>
  </section>
  <footer class="foot">
    <span>HIT ME UP →</span>
    <span><a href="#">X</a> / <a href="#">INSTA</a> / <a href="#">MAIL</a></span>
  </footer>
</div>
<script>
const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('in')),{threshold:.2});
document.querySelectorAll('.js-fade').forEach((el,i)=>setTimeout(()=>io.observe(el),i*200));
</script>
</body></html>
